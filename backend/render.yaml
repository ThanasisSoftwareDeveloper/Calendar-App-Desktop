services:
  - type: web
    name: calendar-app-desktop-backend
    env: python
    region: frankfurt
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn devcalendar_project.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: calendar-app-desktop-db
          property: connectionString
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: "https://calendar-app-desktop-backend.onrender.com/api/auth/google/callback/"
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false

databases:
  - name: calendar-app-desktop-db
    region: frankfurt
    plan: free
    databaseName: calendar_app_desktop
    user: calendar_user
