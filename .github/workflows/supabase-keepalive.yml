name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 9 * * 1,4'  # Κάθε Δευτέρα & Πέμπτη, 9:00 UTC
  workflow_dispatch:        # Και manual trigger αν θες

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Supabase client
        run: npm install @supabase/supabase-js --force

      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          node -e "
          const { createClient } = require('@supabase/supabase-js');
          const supabase = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_ANON_KEY);
          supabase.from('auth_user').select('count', { count: 'exact', head: true })
            .then(({ error }) => {
              if (error) console.log('Ping error (expected if table missing):', error.message);
              else console.log('Supabase ping successful!');
            });
          "
